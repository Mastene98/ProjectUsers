image: node:20

stages:
  - test

tests_api:
  stage: test

  before_script:
    - node -v
    - npm -v
    - npm install newman newman-reporter-htmlextra nodemailer --no-save
    - mkdir -p reports

  script:
    - npx newman run Clients.postman_collection.json -e env.postman_environment.json --reporters cli,htmlextra --reporter-htmlextra-export reports/RapportCollectionClients.html

  after_script:
    - |
      cat > send-mail.js <<'EOF'
      const nodemailer = require("nodemailer");

      const transporter = nodemailer.createTransport({
        host: "smtp.gmail.com",
        port: 587,
        secure: false,
        auth: {
          user: process.env.MAIL_USERNAME,
          pass: process.env.MAIL_PASSWORD
        }
      });

      const body =
        "Bonjour,\n\n" +
        "Les tests API ont ete executes automatiquement avec GitLab CI/CD.\n\n" +
        "Projet : " + process.env.CI_PROJECT_PATH + "\n" +
        "Branche : " + process.env.CI_COMMIT_BRANCH + "\n" +
        "Commit : " + process.env.CI_COMMIT_SHA + "\n" +
        "Statut du job : " + process.env.CI_JOB_STATUS + "\n\n" +
        "Le rapport HTML est joint a ce mail.\n\n" +
        "Cordialement,\n" +
        "GitLab CI/CD";

      transporter.sendMail({
        from: process.env.MAIL_USERNAME,
        to: process.env.MAIL_TO,
        subject: "Rapport tests API Mastene Messouya - GitLab CI/CD - " + process.env.CI_JOB_STATUS,
        text: body,
        attachments: [
          {
            filename: "RapportCollectionClients.html",
            path: "reports/RapportCollectionClients.html"
          }
        ]
      });
      EOF

      node send-mail.js

  artifacts:
    when: always
    paths:
      - reports/RapportCollectionClients.html
    expire_in: 7 days